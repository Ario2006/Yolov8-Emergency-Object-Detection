# Render Blueprint Configuration
# This file configures automatic deployment on Render

services:
  # Backend API Service
  - type: web
    name: yolo-backend
    runtime: python
    buildCommand: |
      pip install -r python/requirements.txt
      cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
    plan: free
    healthCheckPath: /api/health
